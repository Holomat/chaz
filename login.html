<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - atomo</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }

        body {
            min-height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #17171a;
            background:
                radial-gradient(circle at 29% 41%, rgba(143, 159, 255, 0.38), transparent 34vw),
                radial-gradient(circle at 72% 36%, rgba(255, 255, 255, 0.84), transparent 31vw),
                linear-gradient(120deg, #dfe5ff 0%, #eef1ff 56%, #f8f9ff 100%);
        }

        .card {
            position: relative;
            z-index: 1;
            width: min(500px, calc(100vw - 40px));
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(255, 255, 255, 0.78);
            border-radius: 32px;
            box-shadow:
                0 30px 70px rgba(92, 108, 197, 0.16),
                0 10px 28px rgba(46, 51, 89, 0.07),
                inset 0 1px 0 rgba(255, 255, 255, 0.92);
            animation: rise 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
            transition: box-shadow 0.3s ease;
        }

        .card:focus-within {
            box-shadow:
                0 34px 80px rgba(92, 108, 197, 0.21),
                0 12px 30px rgba(46, 51, 89, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.94);
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(14px) scale(0.985); }
            to { opacity: 1; transform: none; }
        }

        .field {
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 60px;
            padding: 0 24px;
        }

        .field:first-child { padding-top: 8px; }
        .field-code { padding-bottom: 2px; }

        input {
            width: 100%;
            min-width: 0;
            border: none;
            outline: none;
            background: transparent;
            font: 400 16px/1.4 'Inter', sans-serif;
            color: #17171a;
            caret-color: #5b67f1;
        }

        input::placeholder {
            color: #c3c5cf;
            transition: color 0.2s ease;
        }

        input:focus::placeholder { color: #d5d7df; }

        .domain {
            flex: 0 0 auto;
            color: #9a9daa;
            font-size: 15px;
            font-weight: 500;
            user-select: none;
        }

        .sep {
            height: 1px;
            margin: 0 24px;
            background: rgba(20, 22, 50, 0.075);
        }

        .row-foot {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 12px 12px 24px;
        }

        .hint {
            color: #8d90a0;
            font-size: 13px;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .hint.err { color: #e0455a; }

        .go {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            height: 44px;
            min-width: 44px;
            padding: 0 19px 0 21px;
            border: none;
            border-radius: 999px;
            background: #202024;
            color: #fff;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
            font: 600 13.5px 'Inter', sans-serif;
            letter-spacing: 0;
            cursor: pointer;
            transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
        }

        .go:hover {
            background: #000;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
        }

        .go:active { transform: scale(0.96); }
        .go:disabled { opacity: 0.55; cursor: default; }

        .go .ar {
            display: inline-block;
            font-size: 14px;
            transition: transform 0.2s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .go:hover .ar { transform: translateX(3px); }

        .card.x { animation: shake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97); }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        @media (prefers-reduced-motion: reduce) {
            .card { animation: none; }
        }

        @media (max-width: 520px) {
            body { padding: 24px; }
            .card { width: 100%; border-radius: 28px; }
            .field { min-height: 58px; padding-inline: 20px; }
            .sep { margin-inline: 20px; }
            .row-foot { padding-left: 20px; }
            input { font-size: 15px; }
            .domain { font-size: 14px; }
        }

        /* <1200px (teléfonos, tablets, laptops <13"): solo escritorio */
        .mobile-gate { display: none; }

        @media (max-width: 1199px) {
            .card { display: none; }
            .mobile-gate {
                display: block;
                width: min(380px, calc(100vw - 40px));
                padding: 38px 30px;
                text-align: center;
                background: rgba(255, 255, 255, 0.96);
                border: 1px solid rgba(255, 255, 255, 0.78);
                border-radius: 28px;
                box-shadow:
                    0 30px 70px rgba(92, 108, 197, 0.16),
                    0 10px 28px rgba(46, 51, 89, 0.07),
                    inset 0 1px 0 rgba(255, 255, 255, 0.92);
            }
            .mobile-gate__icon {
                width: 54px;
                height: 54px;
                margin: 0 auto 22px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 16px;
                background: rgba(122, 134, 220, 0.10);
                color: #5a6486;
            }
            .mobile-gate__icon svg { width: 28px; height: 28px; }
            .mobile-gate__brand {
                font-size: 12px;
                font-weight: 600;
                letter-spacing: 0.16em;
                text-transform: uppercase;
                color: #9a9db0;
                margin-bottom: 12px;
            }
            .mobile-gate__text {
                font-size: 16px;
                line-height: 1.55;
                font-weight: 500;
                color: #2a2d3a;
                margin: 0;
            }
        }
    </style>
</head>
<body>
    <form class="card" id="f" autocomplete="off">
        <div class="field">
            <input type="text" id="user" placeholder="usuario" autocomplete="username" inputmode="email" autocapitalize="none" spellcheck="false" required>
            <span class="domain">@mec.gub.uy</span>
        </div>
        <div class="sep"></div>
        <div class="field field-code">
            <input type="password" id="code" placeholder="Ingresa tu codigo aqui" autocomplete="current-password" required>
        </div>
        <div class="sep"></div>
        <div class="row-foot">
            <span class="hint" id="hint">Acceso privado</span>
            <button class="go" type="submit" id="go">Ingresar <span class="ar">-&gt;</span></button>
        </div>
    </form>

    <div class="mobile-gate" role="dialog" aria-live="polite">
        <div class="mobile-gate__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="12" rx="1.5"/><line x1="2" y1="20" x2="22" y2="20"/>
            </svg>
        </div>
        <div class="mobile-gate__brand">átomo</div>
        <p class="mobile-gate__text">La versión de esta web app está disponible para escritorio y notebooks.</p>
    </div>

    <script>
    (function () {
        const card = document.getElementById('f');
        const user = document.getElementById('user');
        const code = document.getElementById('code');
        const hint = document.getElementById('hint');
        const go = document.getElementById('go');

        const next = new URLSearchParams(location.search).get('next') || '/';

        function fail(msg) {
            hint.textContent = msg;
            hint.classList.add('err');
            card.classList.remove('x');
            void card.offsetWidth;
            card.classList.add('x');

            if (msg.toLowerCase().includes('usuario')) {
                user.focus();
            } else {
                code.value = '';
                code.focus();
            }
        }

        function normalizedEmail() {
            const raw = user.value.trim().toLowerCase();
            if (!raw) return '';
            return raw.includes('@') ? raw : `${raw}@mec.gub.uy`;
        }

        card.addEventListener('submit', async (e) => {
            e.preventDefault();
            go.disabled = true;
            hint.classList.remove('err');
            hint.textContent = 'Verificando...';

            try {
                const email = normalizedEmail();
                if (!email.endsWith('@mec.gub.uy')) {
                    fail('Usa tu usuario MEC.');
                    return;
                }

                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password: code.value })
                });
                const data = await res.json().catch(() => ({}));

                if (res.ok && data.ok) {
                    sessionStorage.setItem('dne_access', email);
                    localStorage.setItem('dne_access', email);
                    hint.textContent = 'Bienvenido';
                    location.href = next.startsWith('/') ? next : '/';
                    return;
                }

                fail(data.error || 'Codigo invalido.');
            } catch (_) {
                fail('Error de conexion. Proba de nuevo.');
            } finally {
                go.disabled = false;
            }
        });

        [user, code].forEach((el) => el.addEventListener('input', () => {
            if (hint.classList.contains('err')) {
                hint.classList.remove('err');
                hint.textContent = 'Acceso privado';
            }
        }));

        setTimeout(() => user.focus(), 100);
    })();
    </script>
</body>
</html>
