<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso — átomo</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(120deg, #dde1fa 0%, #eceefb 55%, #e9ecfa 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ── Fondo: lavanda suave con deriva lenta ── */
        .bg { position: fixed; inset: 0; overflow: hidden; z-index: 0; }
        .orb { position: absolute; border-radius: 50%; filter: blur(110px); will-change: transform; }
        .orb1 { width: 65vw; height: 65vw; top: -25%; left: -15%;
                background: radial-gradient(circle, rgba(124, 134, 250, 0.50) 0%, transparent 70%);
                animation: d1 30s infinite alternate ease-in-out; }
        .orb2 { width: 55vw; height: 55vw; bottom: -20%; right: -10%;
                background: radial-gradient(circle, rgba(255, 255, 255, 0.85) 0%, transparent 70%);
                animation: d2 26s infinite alternate ease-in-out; }
        .orb3 { width: 45vw; height: 45vw; top: 30%; right: 15%;
                background: radial-gradient(circle, rgba(190, 196, 255, 0.40) 0%, transparent 70%);
                animation: d3 34s infinite alternate ease-in-out; }
        @keyframes d1 { to { transform: translate(10vw, 12vh) scale(1.12); } }
        @keyframes d2 { to { transform: translate(-8vw, -10vh) scale(1.10); } }
        @keyframes d3 { to { transform: translate(-12vw, 8vh) scale(0.92); } }

        /* ── Tarjeta: barra de chat elevada ── */
        .card {
            position: relative;
            z-index: 1;
            width: min(420px, calc(100vw - 40px));
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 24px 60px rgba(93, 100, 233, 0.14), 0 4px 14px rgba(30, 33, 70, 0.05);
            transition: box-shadow 0.3s ease;
            animation: rise 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        .card:focus-within {
            box-shadow: 0 28px 70px rgba(93, 100, 233, 0.20), 0 6px 16px rgba(30, 33, 70, 0.06);
        }
        @keyframes rise {
            from { opacity: 0; transform: translateY(14px) scale(0.985); }
            to   { opacity: 1; transform: none; }
        }

        .row-input { padding: 20px 24px 16px; }
        input {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            font: 400 15px/1.4 'Inter', sans-serif;
            color: #17171a;
            caret-color: #5b67f1;
        }
        input::placeholder { color: #a2a4b3; transition: color 0.2s; }
        input:focus::placeholder { color: #c6c8d6; }

        .sep { height: 1px; background: rgba(20, 22, 50, 0.07); margin: 0 24px; }

        .row-foot {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 12px 12px 24px;
        }
        .hint {
            font-size: 13px;
            font-weight: 500;
            color: #8e90a0;
            transition: color 0.2s;
        }
        .hint.err { color: #e0455a; }

        .go {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            height: 40px;
            padding: 0 18px 0 20px;
            border: none;
            border-radius: 999px;
            background: #1b1b1f;
            color: #fff;
            font: 600 13.5px 'Inter', sans-serif;
            letter-spacing: 0.01em;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }
        .go:hover { background: #000; }
        .go:active { transform: scale(0.96); }
        .go:disabled { opacity: 0.55; cursor: default; }
        .go .ar { display: inline-block; font-size: 14px; transition: transform 0.2s cubic-bezier(0.22, 1, 0.36, 1); }
        .go:hover .ar { transform: translateX(3px); }

        .card.x { animation: shake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97); }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        @media (prefers-reduced-motion: reduce) {
            .orb, .card { animation: none; }
        }
    </style>
</head>
<body>
    <div class="bg"><div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div></div>

    <form class="card" id="f" autocomplete="off">
        <div class="row-input">
            <input type="password" id="code" placeholder="Ingresá tu código aquí" autocomplete="current-password" required>
        </div>
        <div class="sep"></div>
        <div class="row-foot">
            <span class="hint" id="hint">Acceso privado</span>
            <button class="go" type="submit" id="go">Ingresar <span class="ar">→</span></button>
        </div>
    </form>

    <script>
    (function () {
        const card = document.getElementById('f');
        const code = document.getElementById('code');
        const hint = document.getElementById('hint');
        const go   = document.getElementById('go');

        const next = new URLSearchParams(location.search).get('next') || '/';

        function fail(msg) {
            hint.textContent = msg;
            hint.classList.add('err');
            card.classList.remove('x');
            void card.offsetWidth;
            card.classList.add('x');
            code.value = '';
            code.focus();
        }

        card.addEventListener('submit', async (e) => {
            e.preventDefault();
            go.disabled = true;
            hint.classList.remove('err');
            hint.textContent = 'Verificando…';
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: code.value })
                });
                const data = await res.json().catch(() => ({}));
                if (res.ok && data.ok) {
                    hint.textContent = 'Bienvenido';
                    location.href = next.startsWith('/') ? next : '/';
                    return;
                }
                fail(data.error || 'Código inválido.');
            } catch (_) {
                fail('Error de conexión. Probá de nuevo.');
            } finally {
                go.disabled = false;
            }
        });

        code.addEventListener('input', () => {
            if (hint.classList.contains('err')) {
                hint.classList.remove('err');
                hint.textContent = 'Acceso privado';
            }
        });

        setTimeout(() => code.focus(), 100);
    })();
    </script>
</body>
</html>
